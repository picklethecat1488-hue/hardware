name: Nightly Build and Test

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Runs at 00:00 UTC every day
  workflow_dispatch:      # Allows manual triggering

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Mambaforge & Cache Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          mamba-version: "*"
          channels: conda-forge
          environment-file: environment.yml
          use-mamba: true
          cache-environment: true # <--- Enables automated caching based on environment.yml hash
          activate-environment: cq

      - name: Run Unit Tests
        shell: bash -el {0}
        env:
          PYTHONPATH: src
        continue-on-error: true
        run: |
          set -o pipefail
          pytest | tee pytest_report.txt

      - name: Run Smoke Tests
        shell: bash -el {0}
        env:
          PYTHONPATH: src
        continue-on-error: true
        run: |
          set -o pipefail
          python src/smoke.py | tee smoke_report.txt

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            pytest_report.txt
            smoke_report.txt

  build:
    name: Build Hardware
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          mamba-version: "*"
          channels: conda-forge
          environment-file: environment.yml
          use-mamba: true
          cache-environment: true # <--- Enables automated caching based on environment.yml hash
          activate-environment: cq

      - name: Build Hardware
        shell: bash -el {0}
        run: |
          python src/build.py -out build

      - name: Configure Hardware
        shell: bash -el {0}
        run: |
          python src/config.py -e build/.env

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: build/