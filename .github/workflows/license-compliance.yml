name: Code scan

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  scancode:
    name: Scan dependencies and report license issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install scancode-toolkit
        run: pip install scancode-toolkit typecode-libmagic

      - name: Verify license compliance
        run: python scripts/license_compliance.py --run-scan
