name: CI Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build123d pydantic pydantic-settings pydantic-changedetect pyyaml numpy pytest ruff halo

      - name: Lint with ruff
        run: ruff check .

      - name: Run Unit Tests
        run: pytest

      - name: Run Integration Tests
        run: pytest src/smoke.py