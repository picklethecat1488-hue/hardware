name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          mamba-version: "*"
          channels: conda-forge
          environment-file: environment.yml
          activate-environment: cq
          use-mamba: true

      - name: Build Hardware
        shell: bash -el {0}
        run: |
          python src/build.py -out build

      - name: Draft Release Notes
        id: release-drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-drafter.outputs.body }}
          files: |
            build/build.zip

      - name: Run Unit Tests
        # Set PYTHONPATH so pytest can find modules in src/
        shell: bash -el {0}
        env:
          PYTHONPATH: src
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -m "slow or not slow" | tee pytest_report.txt

      - name: Run Smoke Tests
        shell: bash -el {0}
        env:
          PYTHONPATH: src
        continue-on-error: true
        run: |
          set -o pipefail
          python src/smoke.py | tee smoke_report.txt

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            pytest_report.txt
            smoke_report.txt